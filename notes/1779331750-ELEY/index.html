<blockquote>
<p>CDC，Change Data Capture，变更数据捕获。</p>
</blockquote>
<p>问题：数据库里发生了 insert / update / delete，我如何把这些变化持续、可靠地传给别的系统？</p>
<p>把数据库的“事实变化”变成一条持续的事件流。</p>
<p>CDC 是把数据库里的状态变化，转换成可订阅、可回放、可派生的事件流。
数据库保存当前事实，CDC 暴露事实变化。</p></article></main><aside class="hidden lg:block"><nav class="sticky top-8 my-8 max-h-[calc(100vh-4rem)] overflow-auto rounded-2xl border border-slate-200 bg-white/80 p-5 text-sm shadow-sm backdrop-blur"><h2 class="mb-4 text-xs font-semibold uppercase tracking-wide text-slate-500">目录</h2><ol class="space-y-2"><li><a class="block truncate text-slate-600 hover:text-blue-600" href="#CDC">CDC</a></li></ol></nav></aside></div></body></html>
