<blockquote>
<p><a href="https://www.ssp.sh/brain/change-data-capture-cdc/">https://www.ssp.sh/brain/change-data-capture-cdc/</a></p>
</blockquote>
<blockquote>
<p>CDC，Change Data Capture，变更数据捕获。</p>
</blockquote>
<p>问题：数据库里发生了 insert / update / delete，我如何把这些变化持续、可靠地传给别的系统？</p>
<p>把数据库的“事实变化”变成一条持续的事件流。</p>
<p>CDC 是把数据库里的状态变化，转换成可订阅、可回放、可派生的事件流。
数据库保存当前事实，CDC 暴露事实变化。</p></article></main></body></html>
