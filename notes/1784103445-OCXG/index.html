<p>程序 = 数据 + 计算（操作）</p>
<p>数据模型：程序操作什么</p>
<p>组织计算：控制结构
约束计算：类型系统、副作用系统</p>
<p>控制结构引出 命令式（描述怎么做）、函数式（描述结果是什么）
类型系统：数据与操作的合法组合</p>
<hr>
<p>程序 = 编译期 + 运行时</p>
<p>编译期：利用静态信息，提前验证程序、生成代码并优化执行
