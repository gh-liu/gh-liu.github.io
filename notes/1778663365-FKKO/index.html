<blockquote>
<p>编程语言承诺给我的抽象，究竟是如何被机器和 OS 支撑起来的？</p>
</blockquote>
<p>OS 把硬件资源抽象成进程、线程、虚拟内存、文件描述符和系统调用；
语言 runtime 再把这些 OS 抽象包装成语言自己的对象、函数、协程、GC、异常、模块、异步 IO 等语义。</p></article></main></body></html>
