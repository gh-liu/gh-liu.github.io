<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Go: Options Pattern</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><p><strong>functional options</strong> 提供一个友好的API，在不改变兼容性的情况下增长，提供合理的默认值，高度可配置</p>
<figure data-rehype-pretty-code-figure=""><pre style="background-color:#2e3440ff;color:#d8dee9ff" tabindex="0" data-language="go" data-theme="nord"><code data-language="go" data-theme="nord" style="display: grid;"><span data-line=""><span style="color:#81A1C1">type</span><span style="color:#D8DEE9FF"> Server </span><span style="color:#81A1C1">struct</span><span style="color:#ECEFF4"> {</span></span>
<span data-line=""><span style="color:#D8DEE9">	host</span><span style="color:#81A1C1"> string</span></span>
<span data-line=""><span style="color:#D8DEE9">	port</span><span style="color:#81A1C1"> int</span></span>
<span data-line=""><span style="color:#ECEFF4">}</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#616E88">// 使用Options Pattern后，New函数签名在新增配置项的情况下也是不变的，是具备兼容性的。</span></span>
<span data-line=""><span style="color:#81A1C1">func</span><span style="color:#88C0D0"> NewServer</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">opts</span><span style="color:#81A1C1"> ...</span><span style="color:#D8DEE9FF">ServerOption</span><span style="color:#ECEFF4">)</span><span style="color:#81A1C1"> *</span><span style="color:#D8DEE9FF">Server </span><span style="color:#ECEFF4">{</span></span>
<span data-line=""><span style="color:#81A1C1">	var</span><span style="color:#D8DEE9"> s</span><span style="color:#D8DEE9FF"> Server</span></span>
<span data-line=""><span style="color:#616E88">    // 可以在这里提供一些合理的默认值</span></span>
<span data-line=""><span style="color:#81A1C1">	for</span><span style="color:#D8DEE9"> _</span><span style="color:#ECEFF4">,</span><span style="color:#D8DEE9"> opt</span><span style="color:#81A1C1"> :=</span><span style="color:#81A1C1"> range</span><span style="color:#D8DEE9"> opts</span><span style="color:#ECEFF4"> {</span></span>
<span data-line=""><span style="color:#88C0D0">		opt</span><span style="color:#ECEFF4">(</span><span style="color:#81A1C1">&#x26;</span><span style="color:#D8DEE9">s</span><span style="color:#ECEFF4">)</span></span>
<span data-line=""><span style="color:#ECEFF4">	}</span></span>
<span data-line=""><span style="color:#81A1C1">	return</span><span style="color:#81A1C1"> &#x26;</span><span style="color:#D8DEE9">s</span></span>
<span data-line=""><span style="color:#ECEFF4">}</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#616E88">// 如果需要校验之类，可以进行检验后，返回一个error</span></span>
<span data-line=""><span style="color:#81A1C1">type</span><span style="color:#D8DEE9FF"> ServerOption </span><span style="color:#81A1C1">func</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">o</span><span style="color:#81A1C1"> *</span><span style="color:#D8DEE9FF">Server</span><span style="color:#ECEFF4">)</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#616E88">// 为每一个配置项提供一个opton函数</span></span>
<span data-line=""><span style="color:#81A1C1">func</span><span style="color:#88C0D0"> Host</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">host</span><span style="color:#81A1C1"> string</span><span style="color:#ECEFF4">)</span><span style="color:#D8DEE9FF"> ServerOption </span><span style="color:#ECEFF4">{</span></span>
<span data-line=""><span style="color:#81A1C1">	return</span><span style="color:#81A1C1"> func</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">s</span><span style="color:#81A1C1"> *</span><span style="color:#D8DEE9FF">Server</span><span style="color:#ECEFF4">)</span><span style="color:#ECEFF4"> {</span></span>
<span data-line=""><span style="color:#D8DEE9">		s</span><span style="color:#ECEFF4">.</span><span style="color:#D8DEE9">host</span><span style="color:#81A1C1"> =</span><span style="color:#D8DEE9"> host</span></span>
<span data-line=""><span style="color:#ECEFF4">	}</span></span>
<span data-line=""><span style="color:#ECEFF4">}</span></span>
<span data-line=""> </span>
<span data-line=""><span style="color:#81A1C1">func</span><span style="color:#88C0D0"> Port</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">port</span><span style="color:#81A1C1"> int</span><span style="color:#ECEFF4">)</span><span style="color:#D8DEE9FF"> ServerOption </span><span style="color:#ECEFF4">{</span></span>
<span data-line=""><span style="color:#81A1C1">	return</span><span style="color:#81A1C1"> func</span><span style="color:#ECEFF4">(</span><span style="color:#D8DEE9">o</span><span style="color:#81A1C1"> *</span><span style="color:#D8DEE9FF">Server</span><span style="color:#ECEFF4">)</span><span style="color:#ECEFF4"> {</span></span>
<span data-line=""><span style="color:#D8DEE9">		o</span><span style="color:#ECEFF4">.</span><span style="color:#D8DEE9">port</span><span style="color:#81A1C1"> =</span><span style="color:#D8DEE9"> port</span></span>
<span data-line=""><span style="color:#ECEFF4">	}</span></span>
<span data-line=""><span style="color:#ECEFF4">}</span></span></code></pre></figure>
