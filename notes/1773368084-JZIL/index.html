<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Go: 标准库 bytes</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="%E6%A0%87%E5%87%86%E5%BA%93%20bytes">标准库 bytes</h1>
<p>同<a href="/notes/1773368074-AIPD">Go: 标准库 strings</a>类似，提供了对<code>字节数组</code>的相关操作。</p>
<p>共同 API 分类见 <a href="/notes/1773368074-AIPD">Go: 标准库 strings#与 bytes 共同 API 分类</a>。</p>
<h2 id="bytes%20%E7%8B%AC%E6%9C%89">bytes 独有</h2>
<h3 id="Equal">Equal</h3>
<p><code>[]byte</code> 不能用 <code>==</code> 比较，需要 <code>bytes.Equal</code>。</p>
<h3 id="Buffer">Buffer</h3>
<blockquote>
<p><code>[]byte</code> 可变，Buffer 天然充当 Builder + Reader 的角色，不需要像 strings 那样额外提供 Builder。</p>
</blockquote>
