<p>S 数据库常被理解成“SQL + 索引 + 存储”的组合。
C 但真实 DBMS 需要同时处理并发请求、查询优化、缓存管理与事务恢复，远比单点组件复杂。
Q 那数据库架构究竟该从哪些核心层次来理解？
A 可将其视为一个多层协作的高并发服务器：SQL 负责表达意图，优化器生成执行计划，存储/缓冲负责数据访问，事务模块保证一致性与恢复。</p>
<p>数据库架构可先抓四层：请求与并发、查询优化与执行、存储与缓冲管理、事务与恢复。DBMS 本质是多模块协作的高并发服务器。</p></article></main></body></html>
