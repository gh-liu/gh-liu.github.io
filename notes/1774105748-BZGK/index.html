<p>每个程序启动，创建一个初始进程，并启动一个线程。线程可以创建更多线程，对线程进行调度。</p>
<p>线程三种状态：</p>
<ul>
<li><strong>waiting</strong>: 等待IO或阻塞</li>
<li><strong>runnable</strong>: 就绪</li>
<li><strong>executing</strong>: 执行中</li>
</ul>
<p>线程工作类型：计算型、IO型</p>
<p>需要注意线程切换带来的消耗、抢占调度、线程池、cache lines、调度决策等。</p></article></main><aside class="hidden lg:block"><nav class="sticky top-8 my-8 max-h-[calc(100vh-4rem)] overflow-auto rounded-2xl border border-slate-200 bg-white/80 p-5 text-sm shadow-sm backdrop-blur"><h2 class="mb-4 text-xs font-semibold uppercase tracking-wide text-slate-500">目录</h2><ol class="space-y-2"><li><a class="block truncate text-slate-600 hover:text-blue-600" href="#OS%20%E7%BA%BF%E7%A8%8B%E8%B0%83%E5%BA%A6">OS 线程调度</a></li></ol></nav></aside></div></body></html>
