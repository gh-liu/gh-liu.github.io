<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>linux-thread</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="OS%20%E7%BA%BF%E7%A8%8B%E8%B0%83%E5%BA%A6">OS 线程调度</h1>
<p>每个程序启动，创建一个初始进程，并启动一个线程。线程可以创建更多线程，对线程进行调度。</p>
<p>线程三种状态：</p>
<ul>
<li><strong>waiting</strong>: 等待IO或阻塞</li>
<li><strong>runnable</strong>: 就绪</li>
<li><strong>executing</strong>: 执行中</li>
</ul>
<p>线程工作类型：计算型、IO型</p>
<p>需要注意线程切换带来的消耗、抢占调度、线程池、cache lines、调度决策等。</p></article></main></body></html>
