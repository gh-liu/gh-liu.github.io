<p>每个程序启动，创建一个初始进程，并启动一个线程。线程可以创建更多线程，对线程进行调度。</p>
<p>线程三种状态：</p>
<ul>
<li><strong>waiting</strong>: 等待IO或阻塞</li>
<li><strong>runnable</strong>: 就绪</li>
<li><strong>executing</strong>: 执行中</li>
</ul>
<p>线程工作类型：计算型、IO型</p>
<p>需要注意线程切换带来的消耗、抢占调度、线程池、cache lines、调度决策等。</p></article></main><aside class="fixed left-[calc(50%+28rem)] top-8 hidden w-40 lg:block"><nav class="max-h-[calc(100vh-4rem)] overflow-y-auto overflow-x-visible rounded-2xl border border-slate-200 bg-white/80 p-5 text-sm shadow-sm backdrop-blur"><h2 class="mb-4 text-xs font-semibold uppercase tracking-wide text-slate-500">目录</h2><div><ol class="space-y-2"><li class="group relative"><a data-toc-link data-heading-id="OS%20%E7%BA%BF%E7%A8%8B%E8%B0%83%E5%BA%A6" class="block truncate text-slate-600 opacity-40 transition hover:text-blue-600 hover:opacity-100" href="#OS%20%E7%BA%BF%E7%A8%8B%E8%B0%83%E5%BA%A6">OS 线程调度</a><span class="pointer-events-none absolute left-0 top-full z-10 mt-1 hidden rounded-md bg-slate-800 px-2 py-1 text-xs text-white shadow-lg group-hover:block">OS 线程调度</span></li></ol></div></nav></aside><script type="module">var e=Array.from(document.querySelectorAll(`h1[id], h2[id], h3[id]`)),t=Array.from(document.querySelectorAll(`[data-toc-link]`)),n=()=>{let n=(e.findLast(e=>e.getBoundingClientRect().top<=120)??e[0])?.id??``;t.forEach(e=>{let t=e.dataset.headingId===n;e.classList.toggle(`font-medium`,t),e.classList.toggle(`text-blue-600`,t),e.classList.toggle(`opacity-100`,t),e.classList.toggle(`opacity-40`,!t)})};n(),window.addEventListener(`scroll`,n,{passive:!0});</script></div></body></html>
