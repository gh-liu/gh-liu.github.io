<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>Go: work 工作区</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="workspace%20%E5%B7%A5%E4%BD%9C%E5%8C%BA">workspace 工作区</h1>
<blockquote>
<p><a href="https://go.dev/ref/mod#workspaces">https://go.dev/ref/mod#workspaces</a></p>
</blockquote>
<blockquote>
<p>用于在同一个目录下同时管理多个 Go 模块</p>
</blockquote>
<ol>
<li><code>go.work</code> 文件：定义工作区，列出要包含的模块目录</li>
<li><code>use</code> 指令：指定要加入工作区的模块（目录需包含 go.mod）</li>
<li><code>replace</code> 指令：同<a href="/notes/1770861174-UPBL">go.mod</a>，可覆盖各模块中的 replace</li>
<li><code>go/toolchain/godebug</code>指令同</li>
</ol>
