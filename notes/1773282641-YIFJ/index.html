<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>表达框架：minto pyramid 明托金字塔</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="minto%20pyramid">minto pyramid</h1>
<blockquote>
<p><a href="https://untools.co/minto-pyramid/">https://untools.co/minto-pyramid/</a></p>
</blockquote>
<blockquote>
<p>让沟通更清晰、更高效</p>
</blockquote>
<blockquote>
<p>"先讲结论，再讲理由，最后补细节"的表达结构</p>
</blockquote>
<ol>
<li>先给结论：给出最重要的信息，你的主张、建议、判断或结论</li>
<li>再给关键论点：用几条简短的关键理由解释"为什么这个结论成立"，不需要太展开，但需足够支撑结论</li>
<li>最后给支撑细节：补充事实、数据、证据、结果等详细信息，增强说服力</li>
</ol>
<p>提出观点，展示理由，举例说明，重申观点</p></article></main></body></html>
