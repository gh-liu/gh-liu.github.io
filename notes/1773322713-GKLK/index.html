<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>http2</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="http2">http2</h1>
<p>解决了http1.1的问题：</p>
<ul>
<li>队头阻塞： 同一个TCP连接里（多个HTTP请求复用），请求响应顺序受限</li>
<li>减少TCP连接：http2倾向于1个域名复用一个TCP连接（减少了TCP三次握手、TLS、多链接维护的成本开销）</li>
<li>Header重复传输：http2使用HPACK压缩头部</li>
<li>文本协议：http2改为二进制分帧，拆成很多frame按规则传递</li>
<li>服务只能响应：http2可以推送（存在感不强）</li>
</ul>
<p>NOTE: 没有完全解决队头阻塞问题，http2还是在TCP之上，受到TCP丢包重传包的影响，这一点由<a href="/notes/1773323217-EDGA">http3</a>解决（在UDP之上）。</p></article></main></body></html>
