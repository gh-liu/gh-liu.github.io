<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>semantic version 语义化版本号</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="%E8%AF%AD%E4%B9%89%E5%8C%96%E7%89%88%E6%9C%AC%E5%8F%B7">语义化版本号</h1>
<blockquote>
<p><a href="https://semver.org/spec/v2.0.0.html">https://semver.org/spec/v2.0.0.html</a></p>
</blockquote>
<p>语义版本号由三个非负整数组成（从左到右 major, minor, patch 版本，由点分割)：</p>
<p>patch可能跟着一个以连字符开始的字符串的预发布版本号，预发布字符串或patch版本可能跟着一个以加号开头的构建元数据。</p>
<p>1.major 向后不兼容；
2.minor 向后兼容改变；
3.patch 不改变模块公共接口的改变；
4.pre-release后缀指定此版本是一个预发布版本；
5.build metadata后缀在比较版本的时候会被忽略，</p></article></main></body></html>
