<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>semantic version 语义化版本号</title><link rel="stylesheet" href="/_astro/_id_.Cy2egwRH.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><div class="mx-auto grid max-w-6xl gap-8 lg:grid-cols-[minmax(0,1fr)_16rem] lg:px-6"><main class="min-h-screen bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="%E8%AF%AD%E4%B9%89%E5%8C%96%E7%89%88%E6%9C%AC%E5%8F%B7">语义化版本号</h1>
<blockquote>
<p><a href="https://semver.org/spec/v2.0.0.html">https://semver.org/spec/v2.0.0.html</a></p>
</blockquote>
<p>语义版本号由三个非负整数组成（从左到右 major, minor, patch 版本，由点分割)：</p>
<p>patch可能跟着一个以连字符开始的字符串的预发布版本号，预发布字符串或patch版本可能跟着一个以加号开头的构建元数据。</p>
<p>1.major 向后不兼容；
2.minor 向后兼容改变；
3.patch 不改变模块公共接口的改变；
4.pre-release后缀指定此版本是一个预发布版本；
5.build metadata后缀在比较版本的时候会被忽略，</p></article></main><aside class="hidden lg:block"><nav class="sticky top-8 my-8 max-h-[calc(100vh-4rem)] overflow-auto rounded-2xl border border-slate-200 bg-white/80 p-5 text-sm shadow-sm backdrop-blur"><h2 class="mb-4 text-xs font-semibold uppercase tracking-wide text-slate-500">目录</h2><ol class="space-y-2"><li><a class="block truncate text-slate-600 hover:text-blue-600" href="#%E8%AF%AD%E4%B9%89%E5%8C%96%E7%89%88%E6%9C%AC%E5%8F%B7">语义化版本号</a></li></ol></nav></aside></div></body></html>
