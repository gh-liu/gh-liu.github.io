<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>react</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="react">react</h1>
<ul>
<li>状态驱动视图：UI = f(state)，界面是状态的函数，状态变了，界面跟着变。</li>
<li>声明式：你只描述"现在这个状态下页面应该长什么样"，不用自己一步步操作 DOM。</li>
<li>组件化：把页面拆成可复用的小组件，每个组件负责自己的一块 UI。</li>
<li>副作用分离：渲染尽量纯，发请求、订阅、定时器这类副作用放到专门的位置处理，比如 useEffect。</li>
</ul></article></main></body></html>
