<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>幺半群</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="%E5%B9%BA%E5%8D%8A%E7%BE%A4%20Monoid%EF%BC%88%E6%9D%A5%E8%87%AA%E6%8A%BD%E8%B1%A1%E4%BB%A3%E6%95%B0%EF%BC%89">幺半群 Monoid（来自抽象代数）</h1>
<p>最简单的代数结构，三要素：</p>
<ol>
<li><strong>一个集合</strong> <code>S</code></li>
<li><strong>一个二元运算</strong> <code>·</code>（把两个元素合并成一个）</li>
<li><strong>一个单位元</strong> <code>e</code>（合并后等于没合并）</li>
</ol>
<p>满足两条法则：</p>
<ul>
<li><strong>结合律</strong>：<code>(a · b) · c = a · (b · c)</code></li>
<li><strong>单位律</strong>：<code>e · a = a</code> 且 <code>a · e = a</code></li>
</ul>
<table>
<thead>
<tr>
<th>集合</th>
<th>运算</th>
<th>单位元</th>
</tr>
</thead>
<tbody>
<tr>
<td>整数</td>
<td><code>+</code></td>
<td><code>0</code></td>
</tr>
<tr>
<td>整数</td>
<td><code>*</code></td>
<td><code>1</code></td>
</tr>
<tr>
<td>字符串</td>
<td>拼接</td>
<td>空串</td>
</tr>
<tr>
<td>布尔</td>
<td><code>&#x26;&#x26;</code></td>
<td><code>True</code></td>
</tr>
<tr>
<td>函数 <code>a → a</code></td>
<td>组合 <code>∘</code></td>
<td><code>id</code></td>
</tr>
</tbody>
</table>
<p>直觉：<strong>可以不断合并、合并顺序无所谓、有一个空操作</strong>的东西。</p></article></main></body></html>
