<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>icmp</title><link rel="stylesheet" href="/_astro/_id_.Cy2egwRH.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><div class="mx-auto grid max-w-6xl gap-8 lg:grid-cols-[minmax(0,1fr)_16rem] lg:px-6"><main class="min-h-screen bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><p>ICMP 学习方式分类：
I Interacting 交互学习；
C Constructing 构建学习；
A Activating 主动学习；
P Passive 被动学习；</p>
<ul>
<li>被动学习：接收信息（听讲座、阅读），但不互动</li>
<li>主动学习：主动参与，尝试提问、讨论、理解</li>
<li>构建学习：整合知识，形成自己的理解和意义，可以解释概念给别人听</li>
<li>交互学习：与他人合作，对话、辩论，共同解决问题，从而深化理解</li>
</ul>
<p>被动转主动：听课阅读做笔记，参与与其他人的讨论；
主动转构建：尝试用自己的话向别人解释学习内容；
构建转交互： 解决实际项目？和他人对话、辩论；</p></article></main></div></body></html>
