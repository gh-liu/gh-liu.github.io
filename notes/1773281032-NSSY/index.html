<!DOCTYPE html><html lang="zh-CN"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width"><title>表达框架：SCQA</title><link rel="stylesheet" href="/_astro/_id_.B-ZajKVB.css"></head><body class="bg-slate-50 text-slate-900 antialiased"><main class="mx-auto min-h-screen max-w-3xl bg-white px-5 py-10 shadow-sm sm:px-10 sm:py-14 lg:my-8 lg:rounded-2xl lg:border lg:border-slate-200"><article class="prose prose-slate max-w-none prose-a:text-blue-600 prose-a:underline-offset-4 prose-pre:bg-slate-950 prose-pre:text-slate-100"><h1 id="%E6%B2%9F%E9%80%9A%E6%A1%86%E6%9E%B6%EF%BC%9ASCQA">沟通框架：SCQA</h1>
<blockquote>
<p><a href="https://antonov.com.au/scqa-framework">https://antonov.com.au/scqa-framework</a></p>
</blockquote>
<ol>
<li>S — Situation：先交代背景和现状</li>
<li>C — Complication：指出在这个背景下出现了什么问题或张力</li>
<li>Q — Question：自然引出“那现在该怎么办”</li>
<li>A — Answer：给出简明直接的回答或方案</li>
</ol>
<p>总结：现在是什么情况 -> 出了什么问题 -> 所以我们要回答什么 -> 我的建议是什么</p>
<p>SCQA和<a href="/notes/1773282641-YIFJ">金字塔原则</a>的关系：SCQA用于引出问题，金字塔原则用于组织回答；还有<a href="/notes/1773281059-FNSZ">MECE原则</a>，保证回答的结构不乱。</p></article></main></body></html>
