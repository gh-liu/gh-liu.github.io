<p>编译器基于语义信息，可以：验证（错误、约束），推导（模板代码、类型系统），优化（去冗余、去抽象）</p>
<p>在编译期：
语义信息越明确（静态），越可形式化，编译器可以做更多事情；
语义信息越模糊（动态），更依赖运行时确定语义，编译器能做的事情越少；</p>
